name: PR 🚀

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Lint, format, typecheck, tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Pinned to match `volta.node` in package.json.
          node-version: '24.14.1'

      - name: Enable Corepack
        # Activates the project-pinned Yarn version (packageManager field).
        run: corepack enable

      - name: Cache Yarn install
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Format check
        run: yarn prettier --check .

      - name: Lint (oxlint)
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Tests (with coverage)
        run: yarn test:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false
