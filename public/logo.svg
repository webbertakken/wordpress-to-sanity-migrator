<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 296 64"
  role="img"
  aria-label="WordPress to Sanity"
>
  <defs>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#21759b" />
      <stop offset="100%" stop-color="#f03e2f" />
    </linearGradient>
  </defs>
  <!-- Compact arrow logomark on the left. -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#0f172a" />
  <path
    d="M14 32 H44 M36 22 L46 32 L36 42"
    stroke="url(#flow)"
    stroke-width="6"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Wordmark to the right of the mark. -->
  <text
    x="80"
    y="40"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="-0.5"
  >
    <tspan fill="#21759b">WordPress</tspan>
    <tspan fill="#94a3b8" dx="2">&#8594;</tspan>
    <tspan fill="#f03e2f" dx="2">Sanity</tspan>
  </text>
</svg>
